<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bgJ" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#8B5A2B"/>
    </radialGradient>
    <radialGradient id="bowlJ" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5C3317"/>
      <stop offset="100%" stop-color="#2D1810"/>
    </radialGradient>
    <radialGradient id="foodJ" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E8C896"/>
      <stop offset="60%" stop-color="#C9A876"/>
      <stop offset="100%" stop-color="#8B6B3D"/>
    </radialGradient>
    <radialGradient id="meatJ" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#5C2C0C"/>
    </radialGradient>
  </defs>
  
  <!-- خلفية -->
  <rect width="400" height="300" fill="url(#bgJ)"/>
  
  <!-- ظل الوعاء -->
  <ellipse cx="200" cy="245" rx="155" ry="20" fill="#000" opacity="0.25"/>
  
  <!-- الوعاء الخارجي -->
  <ellipse cx="200" cy="180" rx="160" ry="65" fill="url(#bowlJ)"/>
  <ellipse cx="200" cy="170" rx="155" ry="55" fill="#3D1F0A"/>
  
  <!-- الطعام (الجريش) -->
  <ellipse cx="200" cy="165" rx="148" ry="48" fill="url(#foodJ)"/>
  
  <!-- نقاط القمح المجروش -->
  <g opacity="0.6">
    <circle cx="120" cy="155" r="3" fill="#8B6B3D"/>
    <circle cx="145" cy="170" r="2.5" fill="#A0825A"/>
    <circle cx="165" cy="160" r="3" fill="#8B6B3D"/>
    <circle cx="185" cy="175" r="2" fill="#7A5C3A"/>
    <circle cx="210" cy="165" r="3" fill="#8B6B3D"/>
    <circle cx="230" cy="180" r="2.5" fill="#A0825A"/>
    <circle cx="255" cy="160" r="3" fill="#7A5C3A"/>
    <circle cx="275" cy="170" r="2" fill="#8B6B3D"/>
    <circle cx="135" cy="180" r="2" fill="#7A5C3A"/>
    <circle cx="195" cy="155" r="2" fill="#A0825A"/>
    <circle cx="245" cy="180" r="2" fill="#7A5C3A"/>
  </g>
  
  <!-- قطع اللحم -->
  <ellipse cx="180" cy="155" rx="22" ry="14" fill="url(#meatJ)"/>
  <ellipse cx="178" cy="152" rx="18" ry="10" fill="#A0522D" opacity="0.7"/>
  
  <ellipse cx="240" cy="170" rx="20" ry="12" fill="url(#meatJ)"/>
  <ellipse cx="238" cy="167" rx="16" ry="8" fill="#A0522D" opacity="0.7"/>
  
  <!-- البصل المقلي -->
  <g fill="#5C2C0C" opacity="0.8">
    <ellipse cx="150" cy="160" rx="8" ry="2" transform="rotate(20 150 160)"/>
    <ellipse cx="220" cy="155" rx="7" ry="2" transform="rotate(-15 220 155)"/>
    <ellipse cx="265" cy="170" rx="8" ry="2" transform="rotate(30 265 170)"/>
    <ellipse cx="170" cy="180" rx="7" ry="2" transform="rotate(-25 170 180)"/>
  </g>
  
  <!-- بقدونس -->
  <g fill="#2D5016">
    <circle cx="200" cy="145" r="3"/>
    <circle cx="195" cy="148" r="2"/>
    <circle cx="205" cy="148" r="2"/>
  </g>
  
  <!-- بخار -->
  <g fill="#FFF" opacity="0.4">
    <ellipse cx="180" cy="100" rx="8" ry="15"/>
    <ellipse cx="200" cy="85" rx="10" ry="20"/>
    <ellipse cx="220" cy="100" rx="8" ry="15"/>
  </g>
  
  <!-- لمعة على الوعاء -->
  <ellipse cx="160" cy="155" rx="40" ry="8" fill="#FFF" opacity="0.15"/>
</svg>
